general: 
  img_size: 224
  seed: 1
  num_classes: 3
  dataset_name: 'isic'
  method: 'AIBSD_teacher'
  num_workers: 16
  train_epochs: 50

model:
  if_resume: False
  resume_path: ''
  if_freeze_encoder: False
  model_name: resnet50
  pretrained: False
  local_pretrained: True
  local_pretrained_path: '/public/home/chenweilin/classImbalace-compareMethod/models/pytorch_model.bin'

cuda:
  gpu_id: '0'
  use_gpu: True
  multi_gpu: False

optimizer:
  type: Adam
  learning_rate: 0.0003

datasets:
  imbalance_ratio: 100
  sampler: None
  batch_size: 64
  head: 2
  medium: 5
  tail: 8
  img_path: '/public/home/chenweilin/class-imbalance/ISIC2019/ISIC_2019_Training_Input/ISIC_2019_Training_Input/'
  train:
    np_path: './numpy/isic/train_100.npy'
    dict_path: './numpy/isic/dic.npy'
  val:
    np_path: './numpy/isic/val_100.npy'
    dict_path: './numpy/isic/dic.npy'
  test:
    np_path: './numpy/isic/test_100.npy'
    dict_path: './numpy/isic/dic.npy'
  transforms:
    train: 'strong'
    val_test: 'crop'
